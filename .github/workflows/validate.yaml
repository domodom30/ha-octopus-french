name: Validate and Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/octopus_french/**"
      - ".github/workflows/**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 1" # Tous les lundis à minuit
  workflow_dispatch:

jobs:
  validate:
    name: Validate with hassfest
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v4

      - name: 🔍 Run hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v4

      - name: 🚀 Run HACS validation
        uses: hacs/action@main
        with:
          category: integration

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, hacs]
    permissions:
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: 📝 Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk "/^## \\[$VERSION\\]/,/^## \\[/ {if (/^## \\[$VERSION\\]/) print; else if (/^## \\[/) exit; else print}" CHANGELOG.md > release_notes.md
            if [ -s release_notes.md ]; then
              echo "notes<<EOF" >> $GITHUB_OUTPUT
              cat release_notes.md >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "📝 Changelog extrait pour v$VERSION"
            else
              echo "notes=" >> $GITHUB_OUTPUT
              echo "⚠️ Aucune entrée trouvée dans CHANGELOG.md pour v$VERSION"
            fi
          else
            echo "notes=" >> $GITHUB_OUTPUT
            echo "⚠️ CHANGELOG.md introuvable"
          fi

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
          draft: false
          prerelease: false
