name: Validate and Release

on:
  push:
    branches:
      - main
    paths:
      - "custom_components/octopus_french/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 1" # Tous les lundis à minuit
  workflow_dispatch:

jobs:
  validate:
    name: Validate with hassfest
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v4

      - name: 🔍 Run hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v4

      - name: 🚀 Run HACS validation
        uses: hacs/action@main
        with:
          category: integration

  tag-and-release:
    name: Tag and Release
    runs-on: ubuntu-latest
    needs: [validate, hacs] # Attend que les validations passent
    permissions:
      contents: write
    # Déclenché manuellement ou si manifest.json a changé lors d'un push
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && 
       github.ref == 'refs/heads/main' &&
       contains(github.event.head_commit.modified, 'custom_components/octopus_french/manifest.json'))

    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Extract version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/octopus_french/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version detected: $VERSION"

      - name: 🔍 Check if tag exists
        id: check_tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Tag v${VERSION} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag v${VERSION} does not exist, will create"
          fi

      - name: 📝 Extract changelog for version
        id: changelog
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk "/^## \\[$VERSION\\]/,/^## \\[/ {if (/^## \\[$VERSION\\]/) print; else if (/^## \\[/) exit; else print}" CHANGELOG.md > release_notes.md
            if [ -s release_notes.md ]; then
              echo "notes<<EOF" >> $GITHUB_OUTPUT
              cat release_notes.md >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "📝 Changelog extracted for version $VERSION"
            else
              echo "notes=" >> $GITHUB_OUTPUT
              echo "⚠️ No changelog found for version $VERSION"
            fi
          else
            echo "notes=" >> $GITHUB_OUTPUT
            echo "⚠️ CHANGELOG.md not found"
          fi

      - name: 🏷️ Create tag and push
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release version ${VERSION}"
          git push origin "v${VERSION}"
          echo "✅ Tag v${VERSION} created and pushed"

      - name: 🚀 Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
          draft: false
          prerelease: false
