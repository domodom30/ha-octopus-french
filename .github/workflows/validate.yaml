name: Validate and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 1" # Tous les lundis à minuit
  workflow_dispatch:

jobs:
  validate:
    name: Validate with hassfest
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7

      - name: 🔍 Run hassfest validation
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7

      - name: 🚀 Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          token: ${{ secrets.GITHUB_TOKEN }}

  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.14 = runtime Home Assistant (≥ 2026.3 exige Python 3.14.2).
        python-version: ["3.14"]
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7

      - name: 🐍 Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install test dependencies
        run: pip install -r requirements_test.txt

      - name: 🧹 Ruff lint
        run: ruff check .

      - name: 🎨 Ruff format check
        run: ruff format --check .

      - name: 🔎 Pyright type check
        run: pyright

      - name: 🧪 Run tests
        run: pytest

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, hacs, lint-test]
    permissions:
      contents: write
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 📋 Read version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/octopus_french/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: 🔍 Check if tag already exists
        id: check_tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "refs/tags/v${VERSION}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "🏷️ Tag v${VERSION} already exists — skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🆕 Tag v${VERSION} not found — creating release"
          fi

      - name: 📝 Extract changelog for version
        id: changelog
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              index($0, "## [" ver "]") == 1 { inrange=1; print; next }
              inrange && /^## \[/ { exit }
              inrange { print }
            ' CHANGELOG.md > release_notes.md
            # retirer les lignes vides de fin puis un éventuel séparateur "---" final
            sed -i -e :a -e '/^[[:space:]]*$/{$d;N;ba}' release_notes.md
            sed -i -e '$ { /^---$/d }' release_notes.md
            sed -i -e :a -e '/^[[:space:]]*$/{$d;N;ba}' release_notes.md
            if [ -s release_notes.md ]; then
              echo "notes<<EOF" >> $GITHUB_OUTPUT
              cat release_notes.md >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "📝 Changelog extrait pour v$VERSION"
            else
              echo "notes=" >> $GITHUB_OUTPUT
              echo "⚠️ Aucune entrée trouvée dans CHANGELOG.md pour v$VERSION"
            fi
          else
            echo "notes=" >> $GITHUB_OUTPUT
            echo "⚠️ CHANGELOG.md introuvable"
          fi

      - name: 🚀 Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
